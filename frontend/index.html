<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Manager</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="A modern inventory management system">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Inventory">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <script>
      // Prevent flash of wrong theme - runs before React
      (function() {
        var theme = localStorage.getItem('theme');
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
        // Set initial background color to prevent flash
        document.documentElement.style.backgroundColor = theme === 'dark' ? '#0f172a' : '#f1f5f9';
      })();
    </script>
    <style>
      /* Critical CSS to prevent flash */
      html, body, #root {
        min-height: 100vh;
      }
      html[data-theme="dark"] {
        background-color: #0f172a;
        color-scheme: dark;
      }
      html[data-theme="light"] {
        background-color: #f1f5f9;
        color-scheme: light;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
